<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="postdraft2.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display postdraft</title>

</head>
<body>

    

<div class="mainbox">

    <div class="content-wrapper" style="transform: scale(0.75); transform-origin: center; display: flex; flex-direction: column; align-items: center; width: 1920px;">

        <!-- Blue Team -->
        <div class="middle" style="margin-top: 0; height: 543px;">
            <div class="pick">
                <div class="lanelogo bluelane">
                    <img id="player-lane-1-blue" class="lane-icon" src="Assets/lane/none.png" alt="">
                </div>
                <div id="name-box-3" class="bluenick"></div>
                <div class="name-image-box" id="name-image-box-3"></div>
                <div id="image-box-1" class="image-box"><img id="image-display-1" src=""></div>
            </div>

            <div class="pick">
                <div class="lanelogo bluelane">
                    <img id="player-lane-2-blue" class="lane-icon" src="Assets/lane/none.png" alt="">
                </div>
                <div id="name-box-4" class="bluenick"></div>
                <div class="name-image-box" id="name-image-box-4"></div>
                <div id="image-box-2" class="image-box"><img id="image-display-2" src=""></div>
            </div>

            <div class="pick">
                <div class="lanelogo bluelane">
                    <img id="player-lane-3-blue" class="lane-icon" src="Assets/lane/none.png" alt="">
                </div>
                <div id="name-box-5" class="bluenick"></div>
                <div class="name-image-box" id="name-image-box-5"></div>
                <div id="image-box-3" class="image-box"><img id="image-display-3" src=""></div>
            </div>

            <div class="pick">
                <div class="lanelogo bluelane">
                    <img id="player-lane-4-blue" class="lane-icon" src="Assets/lane/none.png" alt="">
                </div>
                <div id="name-box-6" class="bluenick"></div>
                <div class="name-image-box" id="name-image-box-6"></div>
                <div id="image-box-4" class="image-box"><img id="image-display-4" src=""></div>
            </div>

            <div class="pick">
                <div class="lanelogo bluelane">
                    <img id="player-lane-5-blue" class="lane-icon" src="Assets/lane/none.png" alt="">
                </div>
                <div id="name-box-7" class="bluenick"></div>
                <div class="name-image-box" id="name-image-box-7"></div>
                <div id="image-box-5" class="image-box"><img id="image-display-5" src=""></div>
            </div>
        </div>

        <!-- Upper Panel (Score) -->
        <div class="upper" style="margin-top: 30px; margin-bottom: 30px;">
            <div class="logoteam">
                <img id="displayImage1" src="" alt="Logo 1 Tidak Ada">
            </div>

            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 520px; margin-right: 20px;">
                <div class="teamnameblue" style="height: 60px; margin: 0; justify-content: center;">
                    <div id="name-box-1" class="name-box"></div>
                </div>
                <div class="scoreinfo" style="height: 120px; margin: 10px 0 0 0; background-size: contain;">
                    <div id="name-box-2" class="name-box"></div>
                </div>
            </div>

            <div class="midscore">
                VS
            </div>

            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 520px; margin-left: 20px;">
                <div class="teamnamered" style="height: 60px; margin: 0; justify-content: center;">
                    <div id="name-box-8" class="name-box"></div>
                </div>
                <div class="scoreinfo" style="height: 120px; margin: 10px 0 0 0; background-size: contain;">
                    <div id="name-box-9" class="name-box"></div>
                </div>
            </div>

            <div class="logoteam">
                <img id="displayImage2" src="" alt="Logo 2 Tidak Ada">
            </div>
        </div>

        <!-- Red Team -->
        <div class="middle" style="margin-top: 0; height: 543px;">
            <div class="pick">
                <div class="lanelogo redlane">
                    <img id="player-lane-1-red" class="lane-icon" src="Assets/lane/none.png" alt="">
                </div>
                <div id="name-box-10" class="rednick"></div>
                <div class="name-image-box" id="name-image-box-10"></div>
                <div id="image-box-6" class="image-box"><img id="image-display-6" src=""></div>
            </div>

            <div class="pick">
                <div class="lanelogo redlane">
                    <img id="player-lane-2-red" class="lane-icon" src="Assets/lane/none.png" alt="">
                </div>
                <div id="name-box-11" class="rednick"></div>
                <div class="name-image-box" id="name-image-box-11"></div>
                <div id="image-box-7" class="image-box"><img id="image-display-7" src=""></div>
            </div>

            <div class="pick">
                <div class="lanelogo redlane">
                    <img id="player-lane-3-red" class="lane-icon" src="Assets/lane/none.png" alt="">
                </div>
                <div id="name-box-12" class="rednick"></div>
                <div class="name-image-box" id="name-image-box-12"></div>
                <div id="image-box-8" class="image-box"><img id="image-display-8" src=""></div>
            </div>

            <div class="pick">
                <div class="lanelogo redlane">
                    <img id="player-lane-4-red" class="lane-icon" src="Assets/lane/none.png" alt="">
                </div>
                <div id="name-box-13" class="rednick"></div>
                <div class="name-image-box" id="name-image-box-13"></div>
                <div id="image-box-9" class="image-box"><img id="image-display-9" src=""></div>
            </div>
            
            <div class="pick">
                <div class="lanelogo redlane">
                    <img id="player-lane-5-red" class="lane-icon" src="Assets/lane/none.png" alt="">
                </div>
                <div id="name-box-14" class="rednick"></div>
                <div class="name-image-box" id="name-image-box-14"></div>
                <div id="image-box-10" class="image-box"><img id="image-display-10" src=""></div>
            </div>
        </div>

    </div>


</div>

<audio id="hero-voice" muted></audio> 

</body>
<!-- Firebase SDK Compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="script/firebase-config.js"></script>

<script src="script/displayhero.js"> </script>
<script src="script/displaynicknamelogo.js"> </script>
<script src="script/laneimg.js"></script>
</html>
